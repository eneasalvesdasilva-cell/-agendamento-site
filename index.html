<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Manutenzione Clima - Ticino</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#eaf6ff,#ffffff);
  color:#0b2a3d;
}

header{
  background:#0b4c6b;
  color:white;
  padding:35px;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 5px 18px rgba(0,0,0,0.08);
  margin-bottom:15px;
}

input,select,textarea,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #d0dbe5;
}

button{
  background:#0b4c6b;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#08384f;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.slot{
  padding:12px;
  background:#d9f1ff;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

.slot.taken{
  background:#ffd6d6;
  cursor:not-allowed;
}

.slot.selected{
  background:#0b4c6b;
  color:white;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>
  <h1>❄️ Manutenzione Clima</h1>
  <p>Servizio HVAC professionale - Ticino 🇨🇭</p>
</header>

<div class="container">

<div class="card">

  <h3>Prenotazione intervento</h3>

  <!-- FORM REAL (ENVIO DE E-MAIL GARANTIDO) -->
  <form action="https://formsubmit.co/MANUTENZIONECLIMASWISS@gmail.com" method="POST">

    <input type="text" name="name" id="name" placeholder="Nome / Name" required>
    <input type="tel" name="phone" id="phone" placeholder="Telefono" required>

    <select name="service" id="service" required>
      <option value="Diagnostico">Diagnostico</option>
      <option value="Manutenzione">Manutenzione</option>
      <option value="Pulizia">Pulizia</option>
    </select>

    <textarea name="description" id="desc" maxlength="120" placeholder="Descrizione breve"></textarea>

    <input type="number" name="equip" id="equip" placeholder="Numero apparecchi">

    <input type="date" name="date" id="date" required>

    <!-- horário será preenchido automaticamente -->
    <input type="hidden" name="time" id="time">

    <div class="grid" id="slots"></div>

    <input type="hidden" name="_subject" value="Nuova prenotazione - Manutenzione Clima">
    <input type="hidden" name="_captcha" value="false">

    <button type="submit" onclick="setTime()">Conferma Prenotazione</button>

  </form>

</div>

</div>

<script>
let bookings = JSON.parse(localStorage.getItem("mc_final") || "[]");

const hours = ["08:00","10:00","12:00","14:00","16:00","18:00"];

const dateEl = document.getElementById("date");
const slotsEl = document.getElementById("slots");

dateEl.valueAsDate = new Date();
dateEl.onchange = render;

function render(){
  slotsEl.innerHTML = "";

  hours.forEach(h=>{
    let taken = bookings.find(b => b.date === dateEl.value && b.time === h);

    let div = document.createElement("div");
    div.className = "slot" + (taken ? " taken" : "");
    div.innerText = h;

    if(!taken){
      div.onclick = () => {
        document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"));
        div.classList.add("selected");
      }
    }

    slotsEl.appendChild(div);
  });
}

// coloca horário selecionado no formulário
function setTime(){
  let selected = document.querySelector(".slot.selected");
  if(selected){
    document.getElementById("time").value = selected.innerText;
  }
}

// visual local (não crítico)
function fakeSave(){
  let selected = document.querySelector(".slot.selected");
  if(!selected) return;
  bookings.push({
    date: dateEl.value,
    time: selected.innerText
  });
  localStorage.setItem("mc_final", JSON.stringify(bookings));
}

render();
</script>

</body>
</html>
